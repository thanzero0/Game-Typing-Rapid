<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypingRapid - Minimal Speed Test</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --cream: #f5f1e8;
            --dark-green: #2d5016;
            --green: #4caf50; /* Brighter green for text readability on dark bg */
            --grey: #4a4a4a;
            --red: #d94a4a;
            --font-main: 'Fira Code', 'JetBrains Mono', Consolas, 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--cream);
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-size: 16px;
        }

        .logo {
            position: absolute;
            top: 2rem;
            left: 2.5rem;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--cream);
            letter-spacing: -1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(245, 241, 232, 0.1);
            user-select: none;
        }

        .logo span {
            color: var(--dark-green);
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            position: relative;
        }

        /* Header (Stats) */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            user-select: none;
        }

        .header.active {
            opacity: 1;
        }

        .stat {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .stat-label {
            color: var(--dark-green);
            font-size: 1.2rem;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .stat-value {
            color: var(--cream);
            font-size: 2.5rem;
            font-weight: bold;
        }

        /* Typing Area */
        .typing-container {
            position: relative;
            height: 140px;
            overflow: hidden;
            border-radius: 8px;
            cursor: text;
        }

        .focus-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--cream);
            font-size: 1.2rem;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
            transition: opacity 0.3s ease;
            background: rgba(12, 12, 12, 0.85);
            padding: 1rem 2.5rem;
            border-radius: 6px;
            border: 1px solid var(--dark-green);
            box-shadow: 0 0 20px rgba(45, 80, 22, 0.3);
            text-align: center;
            letter-spacing: 1px;
        }

        .focus-warning.visible {
            opacity: 1;
        }
        
        .focus-warning .icon {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 1.5rem;
            color: var(--dark-green);
        }

        .words-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 0.8rem 1rem;
            font-size: 1.8rem;
            line-height: 1.5;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), filter 0.3s ease, opacity 0.3s ease;
            user-select: none;
        }

        .words-wrapper.blurred {
            opacity: 0.3;
            filter: blur(5px);
        }

        .word {
            display: flex;
            border-bottom: 2px solid transparent;
            margin-bottom: 0.2rem;
        }

        .word.error {
            border-bottom: 2px solid var(--red);
        }

        .letter {
            color: var(--grey);
            transition: color 0.1s ease;
        }

        .letter.correct {
            color: var(--green);
            text-shadow: 0 0 8px rgba(76, 175, 80, 0.3);
        }

        .letter.incorrect {
            color: var(--red);
            text-shadow: 0 0 8px rgba(217, 74, 74, 0.3);
        }

        .letter.extra {
            opacity: 0.7;
        }

        /* Caret */
        .caret {
            position: absolute;
            width: 3px;
            height: 2.2rem;
            background-color: var(--cream);
            box-shadow: 0 0 10px rgba(245, 241, 232, 0.5);
            top: 0;
            left: 0;
            transition: transform 0.1s linear;
            animation: blink 1s infinite alternate;
            border-radius: 2px;
            z-index: 5;
        }

        .caret.hidden {
            display: none;
            animation: none;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Hidden Input Interface */
        #hidden-input {
            position: absolute;
            opacity: 0;
            top: -1000px;
            left: -1000px;
        }

        /* Results Screen */
        .results-view {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 2.5rem;
            animation: fadeIn 0.4s ease forwards;
        }

        .results-view.active {
            display: flex;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            width: 100%;
        }

        .card {
            background: rgba(45, 80, 22, 0.05);
            border: 1px solid var(--dark-green);
            padding: 2.5rem 1.5rem;
            border-radius: 6px;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        
        .card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--dark-green), transparent);
        }

        .card-label {
            color: var(--grey);
            font-size: 1rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card-value {
            color: var(--cream);
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(245, 241, 232, 0.1);
        }

        .btn-restart {
            margin-top: 1rem;
            background: transparent;
            border: 2px solid var(--dark-green);
            color: var(--cream);
            padding: 1rem 3.5rem;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-restart:hover {
            background: var(--dark-green);
            color: var(--cream);
            box-shadow: 0 0 20px rgba(45, 80, 22, 0.5);
            transform: translateY(-2px);
        }
        
        .btn-restart:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--cream);
        }

        /* Footer hints */
        .footer {
            margin-top: 4rem;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 3rem;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }
        
        .footer:hover {
            opacity: 1;
        }

        .hint {
            color: var(--grey);
            font-size: 0.95rem;
        }

        .kbd {
            background: rgba(245, 241, 232, 0.1);
            color: var(--cream);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin: 0 0.4rem;
            font-size: 0.85rem;
            font-family: var(--font-main);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .typing-container {
                height: 120px;
            }
            .words-wrapper {
                font-size: 1.5rem;
            }
            .stat-value {
                font-size: 2rem;
            }
            .card-value {
                font-size: 3rem;
            }
            .footer {
                flex-direction: column;
                gap: 1rem;
            }
            .logo {
                position: relative;
                top: 0; left: 0;
                margin-bottom: 2rem;
                text-align: center;
            }
            body {
                align-items: flex-start;
                padding-top: 2rem;
            }
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="logo">Typing<span>Rapid</span></div>
    
    <div class="container">
        <!-- Typing View Mode -->
        <div id="typing-view">
            <div id="header" class="header">
                <div class="stat">
                    <div class="stat-value" id="wpm">0</div>
                    <div class="stat-label">wpm</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="time">0s</div>
                    <div class="stat-label">time</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="acc">100%</div>
                    <div class="stat-label">acc</div>
                </div>
            </div>
            
            <div id="typing-container" class="typing-container">
                <div id="focus-warning" class="focus-warning">
                    <span class="icon">&#x2328;</span>
                    Click to resume
                </div>
                
                <div id="words-wrapper" class="words-wrapper blurred">
                    <div id="caret" class="caret hidden"></div>
                </div>
                
                <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
            </div>
        </div>
        
        <!-- Results View Mode -->
        <div id="results-view" class="results-view">
            <div class="results-grid">
                <div class="card">
                    <div class="card-label">WPM</div>
                    <div class="card-value" id="final-wpm">0</div>
                </div>
                <div class="card">
                    <div class="card-label">Accuracy</div>
                    <div class="card-value" id="final-acc">0%</div>
                </div>
                <div class="card">
                    <div class="card-label">Raw WPM</div>
                    <div class="card-value" id="final-raw">0</div>
                </div>
            </div>
            <button id="btn-restart" class="btn-restart">Restart Test</button>
        </div>

        <!-- Footer / Shortcuts -->
        <div class="footer">
            <div class="hint"><span class="kbd">Tab</span> to restart test</div>
            <div class="hint"><span class="kbd">Esc</span> to reset</div>
        </div>
    </div>

    <script>
        // Word Configuration
        const WORD_LIST = [
            "the", "be", "to", "of", "and", "a", "in", "that", "have", "I", "it", "for", "not", "on", "with", 
            "he", "as", "you", "do", "at", "this", "but", "his", "by", "from", "they", "we", "say", "her", 
            "she", "or", "an", "will", "my", "one", "all", "would", "there", "their", "what", "so", "up", 
            "out", "if", "about", "who", "get", "which", "go", "me", "when", "make", "can", "like", "time", 
            "no", "just", "him", "know", "take", "people", "into", "year", "your", "good", "some", "could", 
            "them", "see", "other", "than", "then", "now", "look", "only", "come", "its", "over", "think", 
            "also", "back", "after", "use", "two", "how", "our", "work", "first", "well", "way", "even", 
            "new", "want", "because", "any", "these", "give", "day", "most", "us", "code", "dev", "web", 
            "cyber", "punk", "hack", "git", "tech", "data", "byte", "hash", "server", "cloud", "script", 
            "flow", "state", "null", "void", "test", "fast", "type", "loop", "node", "line", "path", "base", 
            "sync", "port", "root"
        ];
        
        const NUM_WORDS = 30; // Length of test

        // State Variables
        let words = [];
        let currentWordIndex = 0;
        let currentLetterIndex = 0;
        let isStarted = false;
        let isFinished = false;
        let startTime = null;
        let timerInterval = null;
        let timeElapsed = 0;

        // DOM Elements
        const wordsWrapper = document.getElementById('words-wrapper');
        const caret = document.getElementById('caret');
        const hiddenInput = document.getElementById('hidden-input');
        const typingContainer = document.getElementById('typing-container');
        const focusWarning = document.getElementById('focus-warning');

        const header = document.getElementById('header');
        const wpmDisplay = document.getElementById('wpm');
        const accDisplay = document.getElementById('acc');
        const timeDisplay = document.getElementById('time');

        const typingView = document.getElementById('typing-view');
        const resultsView = document.getElementById('results-view');
        const btnRestart = document.getElementById('btn-restart');

        // Initialization
        document.addEventListener('DOMContentLoaded', () => {
            initTest();
            
            // Interaction / Focus Binding
            typingContainer.addEventListener('click', () => {
                if (!isFinished) hiddenInput.focus();
            });

            hiddenInput.addEventListener('blur', () => {
                if (!isFinished) {
                    wordsWrapper.classList.add('blurred');
                    focusWarning.classList.add('visible');
                    caret.classList.add('hidden');
                }
            });

            hiddenInput.addEventListener('focus', () => {
                wordsWrapper.classList.remove('blurred');
                focusWarning.classList.remove('visible');
                caret.classList.remove('hidden');
            });

            btnRestart.addEventListener('click', initTest);
        });

        function initTest() {
            // Reset Flags & State
            isStarted = false;
            isFinished = false;
            currentWordIndex = 0;
            currentLetterIndex = 0;
            timeElapsed = 0;
            clearInterval(timerInterval);
            
            // Reset Views
            typingView.style.display = 'block';
            resultsView.classList.remove('active');
            header.classList.remove('active');
            
            wpmDisplay.innerText = '0';
            accDisplay.innerText = '100%';
            timeDisplay.innerText = '0s';

            // Generate Words
            words = [];
            wordsWrapper.innerHTML = '';
            wordsWrapper.appendChild(caret);
            wordsWrapper.style.transform = `translateY(0)`;
            
            for (let i = 0; i < NUM_WORDS; i++) {
                words.push(WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)]);
            }

            // Render DOM Words
            words.forEach((word) => {
                const wordEl = document.createElement('div');
                wordEl.className = 'word';
                for (let i = 0; i < word.length; i++) {
                    const letterEl = document.createElement('span');
                    letterEl.className = 'letter';
                    letterEl.innerText = word[i];
                    wordEl.appendChild(letterEl);
                }
                wordsWrapper.appendChild(wordEl);
            });

            updateCaretPosition();
            
            // Wait slightly for DOM render to guarantee focus properly
            setTimeout(() => {
                hiddenInput.value = '';
                hiddenInput.focus();
            }, 10);
        }

        function startTimer() {
            isStarted = true;
            header.classList.add('active');
            startTime = Date.now();
            timerInterval = setInterval(() => {
                timeElapsed = Math.floor((Date.now() - startTime) / 1000);
                timeDisplay.innerText = timeElapsed + 's';
                updateLiveStats();
            }, 1000);
        }

        function updateLiveStats() {
            const timeInMin = Math.max(0.01, timeElapsed / 60);
            let correctChars = 0;
            let totalChars = 0;

            const wordEls = wordsWrapper.querySelectorAll('.word');
            wordEls.forEach(wordEl => {
                const letters = wordEl.querySelectorAll('.letter');
                letters.forEach(l => {
                    if (l.classList.contains('correct')) correctChars++;
                    if (l.classList.contains('correct') || l.classList.contains('incorrect')) totalChars++;
                });
            });

            const wpm = Math.floor((correctChars / 5) / timeInMin);
            wpmDisplay.innerText = Math.max(0, wpm);
            
            if (totalChars > 0) {
                const accuracy = Math.floor((correctChars / totalChars) * 100);
                accDisplay.innerText = accuracy + '%';
            }
        }

        function updateCaretPosition() {
            const wordEls = wordsWrapper.querySelectorAll('.word');
            const currentWordEl = wordEls[currentWordIndex];
            if (!currentWordEl) return;
            
            let left = 0;
            let top = 0;

            if (currentLetterIndex < currentWordEl.childNodes.length) {
                const letterEl = currentWordEl.childNodes[currentLetterIndex];
                left = letterEl.offsetLeft;
                top = letterEl.offsetTop;
            } else {
                const lastChild = currentWordEl.lastChild;
                if (lastChild) {
                    left = lastChild.offsetLeft + lastChild.offsetWidth;
                    top = lastChild.offsetTop;
                } else {
                    left = currentWordEl.offsetLeft;
                    top = currentWordEl.offsetTop;
                }
            }

            caret.style.transform = `translate(${left}px, ${top}px)`;

            // Handle Smart Scrolling
            if (currentWordIndex > 0) {
                const firstWordTop = wordEls[0].offsetTop;
                const currentLineHeightOffset = top - firstWordTop;
                const lineHeight = currentWordEl.offsetHeight || 38;
                
                // Keep the current line within the viewable box by shiftingwrapper up
                if (currentLineHeightOffset > lineHeight * 1.5) {
                    const shiftAmount = currentLineHeightOffset - lineHeight;
                    wordsWrapper.style.transform = `translateY(-${shiftAmount}px)`;
                } else {
                    wordsWrapper.style.transform = `translateY(0)`;
                }
            } else {
                wordsWrapper.style.transform = `translateY(0)`;
            }
        }

        // Logic processing
        hiddenInput.addEventListener('keydown', (e) => {
            if (isFinished) {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    initTest();
                }
                return;
            }

            // Keyboard Shortcuts
            if (e.key === 'Tab' || e.key === 'Escape') {
                e.preventDefault();
                initTest();
                return;
            }

            // Ignore system inputs
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            if (e.key.length > 1 && e.key !== 'Backspace' && e.key !== 'Enter') return;

            // Timer Trigger
            if (!isStarted && e.key.length === 1) {
                startTimer();
            }

            const wordEls = wordsWrapper.querySelectorAll('.word');
            const currentWordEl = wordEls[currentWordIndex];
            if (!currentWordEl) return;

            const letterEls = currentWordEl.querySelectorAll('.letter');
            const expectedWord = words[currentWordIndex];

            // Handle Backspace
            if (e.key === 'Backspace') {
                e.preventDefault();
                if (currentLetterIndex > 0) {
                    // Navigate backwards in word
                    const isExtra = currentLetterIndex > expectedWord.length;
                    if (isExtra) {
                        currentWordEl.lastChild.remove();
                    } else {
                        letterEls[currentLetterIndex - 1].classList.remove('correct', 'incorrect');
                    }
                    currentLetterIndex--;
                } else if (currentWordIndex > 0) {
                    // Navigate to previous word only if contained an error
                    const prevWordEl = wordEls[currentWordIndex - 1];
                    const hasError = prevWordEl.querySelectorAll('.incorrect').length > 0 || prevWordEl.classList.contains('error');
                    
                    if (hasError) {
                        currentWordIndex--;
                        currentLetterIndex = prevWordEl.childNodes.length;
                        currentWordEl.classList.remove('error');
                    }
                }
                
                // Clear word-level error status if going back to edit
                if (currentWordEl.classList.contains('error')) {
                    currentWordEl.classList.remove('error');
                }

                updateCaretPosition();
                return;
            }

            // Handle Spacebar / Next Word Navigation
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                // Prevent consecutive spaces jumping words infinitely
                if (currentLetterIndex === 0) return; 

                // Check for incompletion or errors and tag word visual accordingly
                const hasError = currentWordEl.querySelectorAll('.incorrect').length > 0 || currentLetterIndex < expectedWord.length;
                if (hasError) currentWordEl.classList.add('error');
                else currentWordEl.classList.remove('error');

                if (currentWordIndex === NUM_WORDS - 1) {
                    finishTest();
                } else {
                    currentWordIndex++;
                    currentLetterIndex = 0;
                    updateCaretPosition();
                }
                return;
            }

            e.preventDefault(); // Stop standard writing from registering completely

            // Process Standard Key Entry
            if (currentLetterIndex >= expectedWord.length) {
                // Type extra characters bounding to +10 overflow max
                if (currentLetterIndex < expectedWord.length + 10) {
                    const extraEl = document.createElement('span');
                    extraEl.className = 'letter incorrect extra';
                    extraEl.innerText = e.key;
                    currentWordEl.appendChild(extraEl);
                    currentLetterIndex++;
                }
            } else {
                // Determine correctness
                const expectedLetter = expectedWord[currentLetterIndex];
                if (e.key === expectedLetter) {
                    letterEls[currentLetterIndex].classList.add('correct');
                } else {
                    letterEls[currentLetterIndex].classList.add('incorrect');
                }
                currentLetterIndex++;
            }

            updateLiveStats();

            // Automatic completion if exactly matched out at exactly the end
            if (currentWordIndex === NUM_WORDS - 1 && currentLetterIndex === expectedWord.length) {
                const hasError = currentWordEl.querySelectorAll('.incorrect').length > 0;
                if (!hasError) {
                     finishTest();
                     return;
                }
            }
            
            updateCaretPosition();
        });

        function finishTest() {
            isFinished = true;
            clearInterval(timerInterval);
            
            const timeInMin = Math.max(0.01, timeElapsed / 60);
            let correctChars = 0;
            let totalChars = 0;

            // Compute aggregations across complete DOM text status evaluation
            const wordEls = wordsWrapper.querySelectorAll('.word');
            wordEls.forEach(wordEl => {
                const letters = wordEl.querySelectorAll('.letter');
                letters.forEach(l => {
                    if (l.classList.contains('correct')) correctChars++;
                    if (l.classList.contains('correct') || l.classList.contains('incorrect')) totalChars++;
                });
            });

            // Standard typing test calculus based mathematically on 5 keys matching 1 word equivalency metric calculation
            const netWpm = Math.max(0, Math.floor((correctChars / 5) / timeInMin));
            const grossWpm = Math.max(0, Math.floor((totalChars / 5) / timeInMin));
            const accuracy = totalChars > 0 ? Math.floor((correctChars / totalChars) * 100) : 100;
            
            document.getElementById('final-wpm').innerText = netWpm;
            document.getElementById('final-acc').innerText = accuracy + '%';
            document.getElementById('final-raw').innerText = grossWpm;
            
            // UX flow transfer rendering transition execution
            typingView.style.display = 'none';
            wordsWrapper.classList.add('blurred'); // keep layout static underneath theoretically
            header.classList.remove('active');
            
            resultsView.classList.add('active');
            btnRestart.focus();
        }
    </script>
</body>
</html>
