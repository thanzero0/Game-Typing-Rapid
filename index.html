<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypingRapid - Minimal Speed Test</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="logo">Typing<span>Rapid</span></div>
    
    <div class="container">
        <!-- Typing View Mode -->
        <div id="typing-view">
            <div id="header" class="header">
                <div class="stat">
                    <div class="stat-value" id="wpm">0</div>
                    <div class="stat-label">wpm</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="time">0s</div>
                    <div class="stat-label">time</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="acc">100%</div>
                    <div class="stat-label">acc</div>
                </div>
            </div>
            
            <div id="typing-container" class="typing-container">
                <div id="focus-warning" class="focus-warning">
                    <span class="icon">&#x2328;</span>
                    Click to resume
                </div>
                
                <div id="words-wrapper" class="words-wrapper blurred">
                    <div id="caret" class="caret hidden"></div>
                </div>
                
                <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
            </div>
        </div>
        
        <!-- Results View Mode -->
        <div id="results-view" class="results-view">
            <div class="results-grid">
                <div class="card">
                    <div class="card-label">WPM</div>
                    <div class="card-value" id="final-wpm">0</div>
                </div>
                <div class="card">
                    <div class="card-label">Accuracy</div>
                    <div class="card-value" id="final-acc">0%</div>
                </div>
                <div class="card">
                    <div class="card-label">Raw WPM</div>
                    <div class="card-value" id="final-raw">0</div>
                </div>
            </div>
            <button id="btn-restart" class="btn-restart">Restart Test</button>
        </div>

        <!-- Footer / Shortcuts -->
        <div class="footer">
            <div class="hint"><span class="kbd">Tab</span> to restart test</div>
            <div class="hint"><span class="kbd">Esc</span> to reset</div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
